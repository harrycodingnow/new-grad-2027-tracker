# Monitored companies.
#
# Fields:
#   name              display name (must be unique)
#   enabled           set false to skip the company
#   priority          1 = highest, used for sorting reports
#   careers_url       human-facing careers page
#   source_type       greenhouse | lever | ashby | workday | eightfold | json | jsonld | html | playwright | unresolved
#   source_identifier adapter-specific identifier (board token, workday host/tenant/site,
#                     json preset such as smartrecruiters:{company})
#   locations         terms used to keep only matching locations (word-boundary match, US focus)
#   notes             free text; live-validation status is recorded here
#   adapter_config    optional extra configuration (queries, max_pages, selectors, ...)
#
# source_type: unresolved marks companies whose public source could not be
# discovered or collected responsibly (JS-only portals, restricted APIs,
# blocked crawlers). They are skipped at runtime and reported as unsupported
# in source health so they stay visible. Do NOT guess identifiers — validate
# with `python -m job_monitor validate-sources` before enabling.
#
# Live validation last run 2026-07-13 from a non-US network; see README
# "Company support" for the per-company table.

defaults: &us
  locations: ["United States", "US", "USA", "Remote - US", "US Remote", "Remote, US", "New York", "NYC", "San Francisco", "Seattle", "Austin", "Chicago", "Boston", "Bellevue", "Sunnyvale", "Mountain View", "Santa Clara", "San Jose", "San Diego", "Redmond", "Denver", "Atlanta", "Houston", "Dallas", "Portland", "Los Angeles", "Palo Alto", "Menlo Park", "Cupertino", "Irvine", "Phoenix", "Raleigh", "Durham", "Boise", "Folsom", "Hillsboro", "Fort Collins", "Cambridge", "Pittsburgh", "Madison", "Ann Arbor", "Salt Lake City", "Reston", "Arlington", "Washington", "Miami", "Nashville", "Minneapolis", "Charlotte", "Columbus", "Detroit", "Philadelphia", "Jersey City", "Greenwich", "Stamford", "United States of America"]

companies:
  # ---------------------------------------------------------------- priority 1
  - name: Microsoft
    enabled: true
    priority: 1
    careers_url: https://apply.careers.microsoft.com/careers?domain=microsoft.com
    source_type: eightfold
    source_identifier: apply.careers.microsoft.com/microsoft.com
    <<: *us
    adapter_config:
      queries: ["software engineer", "graduate", "machine learning engineer"]
    notes: >-
      Migrated to Eightfold PCSX (validated 2026-07-13); the old GCS search API
      (gcsservices.careers.microsoft.com) is dead — its cert no longer matches
      and the path 404s even ignoring TLS.

  - name: Amazon
    enabled: true
    priority: 1
    careers_url: https://www.amazon.jobs/
    source_type: json
    source_identifier: amazon
    <<: *us
    adapter_config:
      queries: ["software development engineer", "software engineer", "data engineer"]
    notes: >-
      Covers Amazon and AWS via the public amazon.jobs search.json API
      (validated 2026-07-12). Note: base_query uses strict matching, so queries
      are broad role names and the title gate does the narrowing.

  - name: NVIDIA
    enabled: true
    priority: 1
    careers_url: https://www.nvidia.com/en-us/about-nvidia/careers/
    source_type: workday
    source_identifier: nvidia.wd5.myworkdayjobs.com/nvidia/NVIDIAExternalCareerSite
    <<: *us
    notes: "Workday CXS API (validated 2026-07-12, ~2000 US postings)."

