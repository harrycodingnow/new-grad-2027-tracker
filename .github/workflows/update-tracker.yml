name: Update 2027 tracker

# Runs the updater daily and lets you trigger it manually from the Actions tab.
on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC daily (21:00 UTC+8)
  workflow_dispatch:

# Allow the built-in GITHUB_TOKEN to commit README changes back to the repo.
permissions:
  contents: write

concurrency:
  group: update-tracker
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update tracker (commits README.md only when it changes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_BRANCH: ${{ github.ref_name }}
        run: python update_tracker.py
